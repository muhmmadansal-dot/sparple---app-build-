name: Build Test APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Unzip Source Code
      run: |
        unzip *.zip -d extracted_code
        # Move files up if they unzipped inside a nested subfolder
        if [ -d extracted_code/* ] && [ ! -f extracted_code/gradlew ]; then
          mv extracted_code/*/* . 2>/dev/null || mv extracted_code/* .
        else
          mv extracted_code/* .
        fi
      continue-on-error: true

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        chmod +x gradlew 2>/dev/null || chmod +x */gradlew
      continue-on-error: true

    - name: Build Debug APK
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          cd $(find . -name gradlew -exec dirname {} \;) && ./gradlew assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: test-apk
        path: "**/build/outputs/apk/debug/*.apk"
