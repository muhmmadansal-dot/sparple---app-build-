name: Build Sparple APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip any source archives if present
        run: |
          shopt -s nullglob
          zips=(*.zip)
          if [ ${#zips[@]} -gt 0 ]; then
            for z in "${zips[@]}"; do
              echo "Unzipping $z"
              unzip -o "$z" -d .
            done
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Fix ESM config for copy-pdf-worker.js
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (pkg.type !== 'module') {
              pkg.type = 'module';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              console.log('Patched package.json with type: module');
            }
          "

      - name: Build web assets
        run: npm run build

      - name: Ensure TypeScript is available for Capacitor CLI
        run: |
          if ! npx --no-install tsc -v >/dev/null 2>&1; then
            echo "TypeScript not found, installing..."
            npm install --no-save typescript
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject Cordova Fallback Structures Immediately
        run: |
          # Create fallback directory at the root workspace level
          mkdir -p ${{ github.workspace }}/capacitor-cordova-android-plugins/src/main
          
          # Write a fully structured valid dummy build.gradle file with proper SDK configs
          cat << 'EOF' > ${{ github.workspace }}/capacitor-cordova-android-plugins/build.gradle
          apply plugin: 'com.android.library'
          android {
              compileSdkVersion 34
              defaultConfig {
                  minSdkVersion 22
                  targetSdkVersion 34
              }
          }
          EOF
          
          # Force set explicit path injection directly inside settings.gradle right after sync
          cd android
          sed -i "/capacitor-cordova-android-plugins/d" settings.gradle 2>/dev/null || true
          echo "include ':capacitor-cordova-android-plugins'" >> settings.gradle
          echo "project(':capacitor-cordova-android-plugins').projectDir = new File('${{ github.workspace }}/capacitor-cordova-android-plugins')" >> settings.gradle

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle wrapper (self-contained, no system gradle dependency)
        run: |
          cd android
          if [ ! -f "./gradlew" ]; then
            echo "gradlew missing - bootstrapping Gradle 8.4 to generate wrapper..."
            curl -fsSL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparple-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error
