name: Build Test APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Unzip Source Code
      run: |
        unzip *.zip -d extracted_code
        mv extracted_code/* . 2>/dev/null || true
        mv extracted_code/.* . 2>/dev/null || true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: package.json

    - name: Install JavaScript Dependencies
      run: |
        npm install

    - name: Build Web Assets (Fixed Node Execution)
      run: |
        # Run the copy script forcing Node to treat it as a module, then build with vite
        node --experimental-vm-modules scripts/copy-pdf-worker.js || node -e "require('fs').writeFileSync('package.json', JSON.stringify(Object.assign(JSON.parse(require('fs').readFileSync('package.json')), {type: 'module'}), null, 2))" && npm run build

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Sync Capacitor to Android
      run: |
        npx cap sync android

    - name: Build Debug APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: test-apk
        path: "android/app/build/outputs/apk/debug/*.apk"
