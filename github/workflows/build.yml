name: Auto Unzip Files
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Unzip and Clean
      run: |
        unzip -o mygame.zip -d temp_folder
        mv temp_folder/* . || true
        mv temp_folder/.* . || true
        rm -rf temp_folder mygame.zip

    - name: Commit Extracted Files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Automated unzip of project files" || exit 0
        git push
